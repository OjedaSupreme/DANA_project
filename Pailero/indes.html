<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ordenes | Paileria</title>
    <style>
        :root {
            --bg-main: #144674;
            --bg-line: #0ec7ff;
            --bg-line-dark: #0ca9dc;
            --text-main: #f1f6fb;
            --btn-bg: #c9c9cb;
            --btn-border: #8b8b8d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #e6eaef;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
        }

        .hero {
            background: var(--bg-main);
            width: min(96vw, 1500px);
            min-height: 460px;
            padding: 28px 30px 0;
            position: relative;
            border-radius: 12px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
        }

        .header {
            max-width: 1180px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .title {
            margin: 0;
            color: var(--text-main);
            font-size: clamp(30px, 3vw, 42px);
            font-weight: 800;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .logo {
            width: 170px;
            height: 92px;
            border: 3px solid #b7d1e0;
            transform: rotate(-1deg) skewX(-20deg);
            background: linear-gradient(#f5f7fa 0 40%, #2e2a2f 40% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 4px #226998;
        }

        .logo span {
            transform: skewX(20deg);
            font-weight: 900;
            font-size: 48px;
            color: #1f2428;
            text-shadow: 1px 1px 0 #fff;
        }

        .menu {
            max-width: 1320px;
            margin: 88px auto 0;
            display: grid;
            grid-template-columns: repeat(4, minmax(180px, 1fr));
            gap: 34px;
        }

        .menu button {
            min-height: 94px;
            border: 3px solid var(--btn-border);
            border-radius: 16px;
            background: var(--btn-bg);
            color: #151515;
            font-weight: 800;
            font-size: clamp(26px, 1.9vw, 37px);
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.12s ease;
        }

        .menu button:hover {
            transform: translateY(-1px);
            filter: brightness(0.98);
        }

        .menu button:active {
            transform: translateY(1px);
        }

        .footer-lines {
            margin-top: 62px;
        }

        .line {
            width: 100%;
        }

        .line.one {
            height: 6px;
            background: var(--bg-line);
        }

        .line.two {
            height: 18px;
            background: var(--bg-line-dark);
            margin-top: 2px;
        }

        @media (max-width: 980px) {
            body {
                padding: 16px;
                align-items: flex-start;
            }

            .hero {
                min-height: 420px;
                border-radius: 8px;
            }

            .menu {
                grid-template-columns: repeat(2, minmax(180px, 1fr));
                margin-top: 45px;
            }

            .title {
                font-size: 28px;
            }
        }

        @media (max-width: 560px) {
            .hero {
                min-height: 420px;
                width: 100%;
                padding: 18px 14px 0;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .menu {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <header class="header">
            <h1 class="title">Registro de ordenes de trabajo paileria</h1>
            <div class="logo" aria-label="Logo empresa">
                <span>DANA</span>
            </div>
        </header>

        <main class="menu">
            <button type="button">Ingresar nueva orden</button>
            <button type="button">Editar orden</button>
            <button type="button">Visualizar orden</button>
            <button type="button">Administrar orden</button>
        </main>

        <div class="footer-lines">
            <div class="line one"></div>
            <div class="line two"></div>
        </div>
    </section>
</body>
</html>
