<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DANA Project — Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 3rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .badge {
      display: inline-block;
      background: #22c55e;
      color: #052e16;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f8fafc;
    }

    p {
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 1rem 0.5rem;
    }

    .stat strong {
      display: block;
      font-size: 1.5rem;
      color: #38bdf8;
    }

    .stat span {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">✓ Desplegado en Vercel</div>
    <h1>DANA Project</h1>
    <p>
      Página de demostración para validar el despliegue web.
      Si puedes ver esto, la configuración en Vercel funciona correctamente.
    </p>

    <div class="stats">
      <div class="stat">
        <strong>100%</strong>
        <span>Online</span>
      </div>
      <div class="stat">
        <strong>v1.0</strong>
        <span>Versión</span>
      </div>
      <div class="stat">
        <strong>Demo</strong>
        <span>Entorno</span>
      </div>
    </div>

    <footer>Dana Incorporated · 2026</footer>
  </div>
</body>
</html>
